services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 20

  cache-lab:
    build: .
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Optional on host: nocache for A/B demo; APP_SIMULATED_DB_DELAY_MS overrides artificial DB latency (ms)
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      APP_SIMULATED_DB_DELAY_MS: ${APP_SIMULATED_DB_DELAY_MS:-80}
    depends_on:
      redis:
        condition: service_healthy
