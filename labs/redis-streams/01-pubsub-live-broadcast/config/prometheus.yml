global:
  scrape_interval: 3s
  evaluation_interval: 3s

scrape_configs:
  - job_name: pubsub-publisher
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - publisher-api:8080

  - job_name: pubsub-subscriber-a
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - subscriber-a:8080

  - job_name: pubsub-subscriber-b
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - subscriber-b:8080
