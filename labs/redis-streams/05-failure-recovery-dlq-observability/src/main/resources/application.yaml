server:
  port: 8080

spring:
  application:
    name: redis-failure-recovery-dlq-lab
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  role: ${APP_ROLE:producer}
  stream-name: ${APP_STREAM_NAME:order-events}
  dlq-stream-name: ${APP_DLQ_STREAM_NAME:order-events:dlq}
  group-name: ${APP_GROUP_NAME:payment-processing}
  consumer-name: ${APP_CONSUMER_NAME:payment-worker}
  producer-name: ${APP_PRODUCER_NAME:producer-api}
  read-batch-size: ${APP_READ_BATCH_SIZE:5}
  read-block-ms: ${APP_READ_BLOCK_MS:2000}
  processing-delay-ms: ${APP_PROCESSING_DELAY_MS:0}
  failure-probability: ${APP_FAILURE_PROBABILITY:0.0}
  recovery-min-idle-ms: ${APP_RECOVERY_MIN_IDLE_MS:8000}
  recovery-claim-batch-size: ${APP_RECOVERY_CLAIM_BATCH_SIZE:10}
  recovery-poll-ms: ${APP_RECOVERY_POLL_MS:1500}
  recovery-failure-probability: ${APP_RECOVERY_FAILURE_PROBABILITY:0.25}
  max-retries-before-dlq: ${APP_MAX_RETRIES_BEFORE_DLQ:3}
  recent-event-limit: ${APP_RECENT_EVENT_LIMIT:40}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
