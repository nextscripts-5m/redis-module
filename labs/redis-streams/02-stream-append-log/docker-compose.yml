services:
  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 20

  order-producer-api:
    build: .
    ports:
      - "18090:8080"
    environment:
      APP_ROLE: producer
      APP_PRODUCER_NAME: order-producer-api
      APP_STREAM_NAME: order-events
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 40s

  stream-reader:
    build: .
    ports:
      - "18091:8080"
    environment:
      APP_ROLE: stream-reader
      APP_READER_NAME: stream-reader
      APP_STREAM_NAME: order-events
      APP_READER_CURSOR_KEY: order-events:stream-reader:last-id
      APP_FAILURE_PROBABILITY: ${STREAM_READER_FAILURE_PROBABILITY:-0.0}
      APP_PROCESSING_DELAY_MS: ${STREAM_READER_PROCESSING_DELAY_MS:-0}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 40s

  replay-reader:
    build: .
    ports:
      - "18092:8080"
    environment:
      APP_ROLE: replay-reader
      APP_STREAM_NAME: order-events
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 40s

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9092:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    depends_on:
      order-producer-api:
        condition: service_healthy
      stream-reader:
        condition: service_healthy
      replay-reader:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3002:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
